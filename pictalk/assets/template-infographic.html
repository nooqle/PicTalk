<!DOCTYPE html>
<html lang="{{lang}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  :root {
    --title-navy: #071B49;
    --primary-blue: #0757D8;
    --blue-light: #EAF2FF;
    --green: #128348;
    --green-light: #EAF7EF;
    --orange: #E77800;
    --orange-light: #FFF1DE;
    --purple: #5A2BAE;
    --purple-light: #F1EAFB;
    --gray: #6B7280;
    --gray-light: #F3F6FB;
    --border: #BFD2F5;
    --text: #111827;
    --canvas-w: 1086px;
    --canvas-h: 1448px;
  }

  html,
  body {
    margin: 0;
    width: var(--canvas-w);
    height: var(--canvas-h);
    overflow: hidden;
    background: #fff;
  }

  body {
    font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .sheet {
    position: relative;
    width: var(--canvas-w);
    height: var(--canvas-h);
    overflow: hidden;
    padding: 46px 48px 36px;
    background:
      radial-gradient(circle at 50% 26%, rgba(7, 87, 216, .065), transparent 34%),
      radial-gradient(circle at 18% 68%, rgba(18, 131, 72, .045), transparent 28%),
      linear-gradient(180deg, #fff 0%, #F8FBFF 100%);
  }

  .sheet::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(7, 87, 216, .035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(7, 87, 216, .03) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at 50% 42%, rgba(0,0,0,.42), transparent 64%);
  }

  .sheet > * { position: relative; z-index: 1; }

  .title-block {
    text-align: center;
    margin: 6px auto 20px;
  }

  .title-block h1 {
    margin: 0;
    color: var(--title-navy);
    font-size: 58px;
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: 0;
  }

  .subtitle-row {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    color: #34456E;
    font-size: 25px;
    line-height: 1.38;
    font-weight: 400;
  }

  .subtitle-row::before,
  .subtitle-row::after {
    content: "";
    width: 86px;
    height: 1px;
    background: #97AFDD;
  }

  .top-flow {
    display: grid;
    grid-template-columns: repeat(var(--flow-count), minmax(0, 1fr));
    align-items: center;
    gap: 22px;
    margin: 22px 0 34px;
    padding: 18px 24px;
    border: 1.5px solid #AFC5F7;
    border-radius: 18px;
    background: rgba(255,255,255,.82);
    box-shadow: 0 12px 28px rgba(7, 87, 216, .06);
  }

  .flow-item {
    display: grid;
    grid-template-columns: 42px 1fr 22px;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .flow-item:last-child { grid-template-columns: 42px 1fr; }
  .flow-item:last-child .flow-arrow { display: none; }

  .flow-icon,
  .icon-well,
  .node-icon,
  .band-icon,
  .badge-icon {
    display: grid;
    place-items: center;
    flex: 0 0 auto;
  }

  .flow-icon {
    width: 42px;
    height: 42px;
    color: var(--primary-blue);
  }

  .flow-icon svg,
  .icon-well svg,
  .node-icon svg,
  .band-icon svg,
  .badge-icon svg {
    width: 100%;
    height: 100%;
  }

  .flow-label {
    font-size: 18px;
    line-height: 1.24;
    font-weight: 800;
    color: var(--title-navy);
    white-space: normal;
  }

  .flow-arrow {
    color: #6C91E8;
    font-size: 30px;
    font-weight: 900;
  }

  .layout-region {
    min-height: 0;
  }

  .panel {
    background: rgba(255,255,255,.9);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 14px 32px rgba(7, 27, 73, .075);
  }

  .icon-well {
    width: 54px;
    height: 54px;
    border-radius: 13px;
    padding: 10px;
  }

  .iw-blue { background: var(--blue-light); color: var(--primary-blue); }
  .iw-green { background: var(--green-light); color: var(--green); }
  .iw-orange { background: var(--orange-light); color: var(--orange); }
  .iw-purple { background: var(--purple-light); color: var(--purple); }
  .iw-gray { background: #EEF1F6; color: #748095; }

  .section-title {
    margin: 0;
    color: var(--title-navy);
    font-size: 28px;
    line-height: 1.24;
    font-weight: 850;
  }

  .section-body {
    margin: 12px 0 0;
    padding: 0;
    list-style: none;
    display: grid;
    gap: 9px;
    align-content: start;
  }

  .section-body li {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 9px;
    align-items: start;
    color: #374151;
    font-size: 20px;
    line-height: 1.42;
    font-weight: 500;
  }

  .section-body li::before {
    content: "";
    width: 7px;
    height: 7px;
    margin-top: 11px;
    border-radius: 99px;
    background: currentColor;
    opacity: .36;
  }

  .conclusion-band {
    display: grid;
    grid-template-columns: 46px 1fr;
    align-items: center;
    gap: 14px;
    min-height: 74px;
    margin-top: 22px;
    padding: 17px 24px;
    border-radius: 14px;
    background: linear-gradient(135deg, #063EAD, #0757D8);
    box-shadow: 0 14px 28px rgba(7, 87, 216, .18);
    color: #fff;
  }

  .conclusion-band.green { background: linear-gradient(135deg, #087443, var(--green)); }
  .conclusion-band.purple { background: linear-gradient(135deg, #482096, var(--purple)); }
  .conclusion-band.orange { background: linear-gradient(135deg, #BC5700, var(--orange)); }

  .band-icon {
    width: 46px;
    height: 46px;
    padding: 10px;
    border-radius: 99px;
    background: rgba(255,255,255,.18);
  }

  .band-text {
    font-size: 25px;
    line-height: 1.36;
    font-weight: 850;
    letter-spacing: 0;
  }

  .metric-row {
    display: grid;
    grid-template-columns: repeat(var(--metric-count), minmax(0, 1fr));
    gap: 12px;
    margin-top: 20px;
  }

  .metric-card {
    display: grid;
    grid-template-columns: 26px 1fr;
    gap: 10px;
    align-items: center;
    min-height: 72px;
    padding: 12px 14px;
    border: 1px solid #D6E2FA;
    border-radius: 12px;
    background: rgba(255,255,255,.9);
  }

  .metric-dot {
    width: 19px;
    height: 19px;
    border-radius: 5px;
  }

  .metric-label {
    color: #6B7280;
    font-size: 15px;
    line-height: 1.2;
    font-weight: 650;
  }

  .metric-value {
    margin-top: 3px;
    color: var(--title-navy);
    font-size: 20px;
    line-height: 1.26;
    font-weight: 850;
  }

  /* PT01: vertical cycle, matched to the reference PicTalk image shape. */
  .layout-cycle {
    display: grid;
    grid-template-rows: 1fr auto auto;
    min-height: 860px;
  }

  .cycle-canvas {
    position: relative;
    height: 720px;
  }

  .cycle-canvas .cycle-arrows {
    position: absolute;
    inset: 20px 20px 0;
    width: calc(100% - 40px);
    height: 650px;
    overflow: visible;
    pointer-events: none;
  }

  .cycle-center {
    position: absolute;
    left: 50%;
    top: 48%;
    transform: translate(-50%, -50%);
    width: 295px;
    height: 295px;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 38px;
    border-radius: 999px;
    background: radial-gradient(circle at 35% 25%, #327CFF 0%, #0757D8 58%, #0442B8 100%);
    color: #fff;
    box-shadow: 0 22px 46px rgba(7, 87, 216, .27);
  }

  .cycle-center-text {
    font-size: 30px;
    line-height: 1.43;
    font-weight: 900;
  }

  .cycle-node {
    position: absolute;
    width: 292px;
    min-height: 132px;
    padding: 18px 18px 18px 74px;
  }

  .cycle-node .node-index {
    position: absolute;
    left: 50%;
    top: -29px;
    transform: translateX(-50%);
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    background: var(--primary-blue);
    color: #fff;
    font-size: 30px;
    font-weight: 900;
    box-shadow: 0 12px 20px rgba(7, 87, 216, .24);
  }

  .cycle-node .node-icon {
    position: absolute;
    left: 22px;
    top: 42px;
    width: 40px;
    height: 40px;
    color: var(--primary-blue);
  }

  .cycle-node h3 {
    margin: 0;
    color: var(--title-navy);
    font-size: 25px;
    line-height: 1.24;
    font-weight: 900;
  }

  .cycle-node p {
    margin: 9px 0 0;
    color: #374151;
    font-size: 18px;
    line-height: 1.38;
    font-weight: 500;
  }

  .output-band {
    margin-top: 18px;
    padding: 24px 26px;
    border: 1.5px solid #BFD2F5;
    border-radius: 18px;
    background: rgba(255,255,255,.82);
  }

  .output-title {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    color: var(--primary-blue);
    font-size: 25px;
    font-weight: 900;
    text-align: center;
  }

  .output-title::before,
  .output-title::after {
    content: "";
    height: 1px;
    background: #BFD2F5;
  }

  /* PT02: transformation. */
  .layout-transformation .transformation-grid {
    display: grid;
    grid-template-columns: 1fr 34px 1fr 34px 1fr;
    gap: 14px;
    align-items: stretch;
    min-height: clamp(520px, calc(var(--canvas-h) - 560px), 780px);
  }

  .transform-card {
    padding: 26px 22px;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  .transform-head {
    display: grid;
    grid-template-columns: 58px 1fr;
    align-items: center;
    gap: 14px;
  }

  .transform-footer {
    margin-top: 18px;
    padding-top: 13px;
    border-top: 1px solid #D9E6FF;
    color: var(--primary-blue);
    font-size: 18px;
    font-weight: 900;
    text-align: center;
  }

  .transform-card.muted {
    background: rgba(255,255,255,.86);
    border-color: #DCE3EF;
  }

  .transform-card.primary {
    background: linear-gradient(180deg, #fff 0%, #EAF2FF 100%);
    border-color: var(--primary-blue);
    box-shadow: 0 18px 36px rgba(7, 87, 216, .12);
  }

  .transform-card.explore {
    background: linear-gradient(180deg, #fff 0%, #F1EAFB 100%);
    border-color: #D8C9F4;
  }

  .big-arrow {
    display: grid;
    place-items: center;
    color: var(--primary-blue);
    font-size: 38px;
    font-weight: 900;
  }

  /* PT03: arrow flow. */
  .layout-arrow-flow .flow-steps {
    display: grid;
    grid-template-columns: repeat(var(--step-count), minmax(0, 1fr));
    align-items: stretch;
    gap: 18px;
    min-height: 560px;
  }

  .flow-step {
    position: relative;
    padding: 30px 20px 22px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 14px;
  }

  .flow-step::after {
    content: "→";
    position: absolute;
    right: -24px;
    top: 47%;
    color: var(--primary-blue);
    font-size: 34px;
    font-weight: 900;
  }

  .flow-step:last-child::after { display: none; }

  .step-badge {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    background: var(--primary-blue);
    color: #fff;
    font-size: 24px;
    font-weight: 900;
  }

  /* PT04: timeline. */
  .layout-timeline .timeline {
    position: relative;
    display: grid;
    grid-template-columns: repeat(var(--step-count), minmax(0, 1fr));
    gap: 18px;
    min-height: 610px;
    padding-top: 95px;
  }

  .layout-timeline .timeline::before {
    content: "";
    position: absolute;
    left: 7%;
    right: 7%;
    top: 120px;
    height: 5px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--orange), var(--primary-blue), var(--green));
  }

  .timeline-card {
    position: relative;
    padding: 90px 20px 24px;
  }

  .timeline-dot {
    position: absolute;
    left: 50%;
    top: -2px;
    transform: translateX(-50%);
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    border: 6px solid #fff;
    border-radius: 999px;
    background: var(--primary-blue);
    color: #fff;
    font-size: 23px;
    font-weight: 900;
    box-shadow: 0 10px 20px rgba(7, 87, 216, .2);
  }

  /* PT05: matrix. */
  .layout-matrix .matrix-grid {
    display: grid;
    grid-template-columns: 1.1fr repeat(var(--matrix-cols), minmax(0, 1fr));
    border: 1.5px solid #BFD2F5;
    border-radius: 18px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 14px 32px rgba(7, 27, 73, .075);
  }

  .matrix-cell {
    min-height: 118px;
    padding: 18px;
    border-right: 1px solid #D8E5FB;
    border-bottom: 1px solid #D8E5FB;
    font-size: 19px;
    line-height: 1.36;
    font-weight: 650;
  }

  .matrix-cell.header {
    background: var(--blue-light);
    color: var(--title-navy);
    font-weight: 900;
  }

  .matrix-cell.row-head {
    background: #F8FAFF;
    color: var(--primary-blue);
    font-weight: 900;
  }

  .matrix-cell:last-child { border-right: 0; }

  /* PT06: layer stack. */
  .layout-layer-stack .layer-wrap {
    display: grid;
    grid-template-columns: 1fr 270px;
    gap: 24px;
    min-height: 635px;
    align-items: stretch;
  }

  .layer-stack {
    display: grid;
    grid-template-rows: repeat(var(--step-count), minmax(0, 1fr));
    gap: 13px;
  }

  .layer-card {
    display: grid;
    grid-template-columns: 58px 1fr;
    align-items: center;
    gap: 18px;
    padding: 18px 24px;
  }

  .layer-index {
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    background: var(--primary-blue);
    color: #fff;
    font-size: 27px;
    font-weight: 900;
  }

  .side-note {
    display: grid;
    align-content: center;
    gap: 18px;
    padding: 26px;
    background: linear-gradient(180deg, #fff, #EAF2FF);
  }

  .side-note h3 {
    margin: 0;
    color: var(--primary-blue);
    font-size: 28px;
    line-height: 1.22;
  }

  .side-note p {
    margin: 0;
    color: #374151;
    font-size: 21px;
    line-height: 1.45;
    font-weight: 600;
  }

  .hierarchy-body {
    display: grid;
    grid-template-columns: 68px minmax(0, 1fr) 320px;
    gap: 18px;
    min-height: 690px;
    align-items: stretch;
  }

  .demand-arrow {
    position: relative;
    display: grid;
    place-items: center;
    min-height: 100%;
    border-radius: 17px;
    background: linear-gradient(180deg, #0757D8, #9ECEFF);
    color: #fff;
    box-shadow: 0 16px 26px rgba(7, 87, 216, .16);
  }

  .demand-arrow::before {
    content: "";
    position: absolute;
    top: -38px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 34px solid transparent;
    border-right: 34px solid transparent;
    border-bottom: 54px solid #0757D8;
  }

  .demand-arrow div {
    writing-mode: vertical-rl;
    letter-spacing: .12em;
    font-size: 24px;
    line-height: 1.2;
    font-weight: 900;
  }

  .side-levels {
    display: grid;
    grid-template-rows: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .side-level {
    display: grid;
    grid-template-columns: 64px 1fr;
    grid-template-rows: auto 1fr;
    column-gap: 16px;
    align-items: center;
    padding: 22px 20px;
  }

  .side-level .badge-icon {
    grid-row: 1 / span 2;
    width: 58px;
    height: 58px;
    border-radius: 999px;
    padding: 12px;
  }

  .side-level h3 {
    margin: 0;
    color: var(--title-navy);
    font-size: 28px;
    line-height: 1.2;
    font-weight: 900;
  }

  .side-level p {
    margin: 8px 0 0;
    color: #374151;
    font-size: 21px;
    line-height: 1.45;
    font-weight: 650;
  }

  /* Premium layouts: reference-grade single-image explanation graphics. */
  .premium-sheet {
    padding: 24px 48px 22px;
    background:
      radial-gradient(circle at 50% 18%, rgba(7, 87, 216, .08), transparent 34%),
      linear-gradient(180deg, #FFFFFF 0%, #F7FAFF 100%);
  }

  .premium-hierarchy-sheet {
    padding: 22px 28px 18px;
  }

  .premium-sheet .title-block {
    margin-top: 2px;
    margin-bottom: 16px;
  }

  .premium-sheet .title-block h1 {
    font-size: 50px;
    line-height: 1.22;
    text-wrap: balance;
  }

  .premium-sheet .subtitle-row {
    margin-top: 12px;
    font-size: 22px;
  }

  .premium-icon {
    width: 54px;
    height: 54px;
    border-radius: 14px;
    padding: 11px;
  }

  .tone-blue { border-color: #B8CDFB; }
  .tone-green { border-color: #BDE6CE; }
  .tone-orange { border-color: #F5D0A3; }
  .tone-purple { border-color: #D8C9F4; }
  .tone-gray { border-color: #D9DEE8; }

  .essence-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    max-width: 100%;
    min-height: 30px;
    padding: 6px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, #0757D8, #2F7DFF);
    color: #fff;
    font-size: 16px;
    line-height: 1.1;
    font-weight: 900;
    white-space: normal;
  }

  .premium-row-title {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    margin: 16px 0 12px;
    color: var(--primary-blue);
    font-size: 23px;
    line-height: 1.18;
    font-weight: 900;
    text-align: center;
  }

  .premium-row-title::before,
  .premium-row-title::after {
    content: "";
    height: 1px;
    background: #BED1F6;
  }

  .premium-sheet .conclusion-band {
    margin-top: 14px;
    min-height: 78px;
    padding: 16px 22px;
  }

  .premium-sheet .band-text {
    font-size: 23px;
  }

  /* PTP02: benchmark-aligned premium hierarchy + diffusion. */
  .premium-hierarchy-main {
    position: relative;
    display: grid;
    grid-template-columns: 82px minmax(0, 1fr) 42px 326px;
    gap: 10px;
    width: calc(100% + 44px);
    height: 812px;
    margin-left: -22px;
    align-items: stretch;
  }

  .layer-rail {
    position: relative;
    grid-column: 1;
    display: grid;
    place-items: center;
    min-height: 0;
    height: 100%;
    border-radius: 18px 18px 14px 14px;
    background: linear-gradient(180deg, #0450CE 0%, #1E74EA 58%, #A9CCFF 100%);
    box-shadow: 0 16px 30px rgba(7, 87, 216, .18);
    color: #fff;
  }

  .layer-rail::before {
    content: "";
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 36px solid transparent;
    border-right: 36px solid transparent;
    border-bottom: 54px solid #0450CE;
  }

  .layer-rail div {
    writing-mode: vertical-rl;
    letter-spacing: .1em;
    font-size: 21px;
    line-height: 1.15;
    font-weight: 900;
  }

  .benchmark-layer-stack {
    display: grid;
    grid-column: 2;
    grid-template-rows: repeat(4, minmax(0, 1fr));
    gap: 9px;
    min-height: 0;
    height: 100%;
    z-index: 1;
  }

  .benchmark-layer {
    position: relative;
    display: grid;
    grid-template-columns: 132px 1fr;
    gap: 0;
    align-items: stretch;
    min-height: 0;
    overflow: visible;
    padding: 0;
    background: rgba(255,255,255,.96);
    border-radius: 17px;
  }

  .benchmark-layer .premium-layer-head {
    gap: 9px;
  }

  .benchmark-layer-no {
    position: absolute;
    left: -16px;
    top: 12px;
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    background: #fff;
    border: 4px solid #D8E7FF;
    color: #fff;
    color: var(--primary-blue);
    font-size: 23px;
    line-height: 1;
    font-weight: 900;
    box-shadow: 0 8px 16px rgba(7, 87, 216, .18);
  }

  .benchmark-icon-block {
    display: grid;
    place-items: center;
    min-height: 100%;
    border-radius: 15px 0 0 15px;
    background: linear-gradient(180deg, #0757D8, #2C83F6);
  }

  .benchmark-icon-block.tone-green { background: linear-gradient(180deg, #108A4A, #4DBD75); }
